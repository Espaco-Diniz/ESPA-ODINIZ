<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="format-detection" content="telephone=no">
  <title>Espaço Diniz 💕</title>
  <link rel="stylesheet" href="assest/index.css">

  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@400;600&display=swap" rel="stylesheet" />

  <style>
    h1 {
      font-family: 'Great Vibes', cursive;
      font-size: 60px;
      margin-bottom: 20px;
    }

    p {
      max-width: 800px;
      margin: 10px auto;
      line-height: 1.8;
      font-size: 18px;
    }

    img {
      width: 200px;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.4);
      margin-bottom: 20px;
    }

    .hearts-left,
    .hearts-right {
      position: fixed;
      top: 0;
      width: 60px;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .hearts-left { left: 0; }
    .hearts-right { right: 0; }

    .heart {
      position: absolute;
      bottom: -20px;
      opacity: 0;
      animation: floatUp 6s linear forwards;
    }

    @keyframes floatUp {
      0% { transform: translateY(0) scale(0.8); opacity: 0; }
      10% { opacity: 1; }
      50% { opacity: 1; }
      100% { transform: translateY(-100vh) scale(1.2); opacity: 0; }
    }

    /* Links e botões */
    a {
      color: black !important;
      text-decoration: none !important;
    }

    a:visited, a:hover, a:active {
      color: black !important;
    }

    .btn {
      display: inline-block;
      padding: 17px 40px;
      border-radius: 50px;
      cursor: pointer;
      border: 0;
      background: linear-gradient(90deg, #f5d878, #e3dab7);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      font-size: 15px;
      transition: all 0.5s ease;
      color: black !important;
      text-decoration: none !important;
    }

    .btn:hover {
      letter-spacing: 3px;
      background-color: bisque;
      color: rgb(248, 246, 242);
    }

    .btn:active {
      transform: translateY(5px);
      transition: 100ms;
    }
  </style>
</head>
<body>
  <div class="hearts-left"></div>
  <div class="hearts-right"></div>

  <main>
    <img src="./assest/img/imagem1.jpeg" alt="Espaço Diniz" />
    
    <p><a href="http://wa.me/5581998040373" class="btn">AGENDAR</a></p>
    <p><a href="http://wa.me/5581998724783" class="btn">Quero ser aluno/informações</a></p>
    <br><br><br><br>
    <p><a href="https://maps.app.goo.gl/ycMkk8ccLpVxs9Rg8?g_st=aw" class="btn">Localização</a></p>
  </main>

  <script>
    const leftContainer = document.querySelector('.hearts-left');
    const rightContainer = document.querySelector('.hearts-right');

    function createHeart(container) {
      const heart = document.createElement('div');
      heart.classList.add('heart');

      // SVG do coração branco
      heart.innerHTML = `
        <svg width="20" height="20" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 
                   2 5.42 4.42 3 7.5 3c1.74 0 3.41 0.81 4.5 2.09 
                   C13.09 3.81 14.76 3 16.5 3 
                   19.58 3 22 5.42 22 8.5 
                   c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
        </svg>
      `;

      heart.style.left = `${Math.random() * 40 + 10}px`;
      heart.style.animationDuration = `${Math.random() * 3 + 4}s`;

      container.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 7000);
    }

    setInterval(() => createHeart(leftContainer), 600);
    setInterval(() => createHeart(rightContainer), 600);
  </script>
</body>
</html>
